<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Grand O rouge -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#E8231A" stroke-width="18"/>
  <!-- Ouverture du O (partie gauche) -->
  <rect x="0" y="36" width="22" height="28" fill="white"/>
  <!-- Panier bleu marine -->
  <g transform="translate(8, 38)">
    <rect x="0" y="8" width="26" height="16" rx="2" fill="#1E3A6E"/>
    <line x1="4" y1="8" x2="4" y2="24" stroke="white" stroke-width="1.5"/>
    <line x1="9" y1="8" x2="9" y2="24" stroke="white" stroke-width="1.5"/>
    <line x1="14" y1="8" x2="14" y2="24" stroke="white" stroke-width="1.5"/>
    <line x1="19" y1="8" x2="19" y2="24" stroke="white" stroke-width="1.5"/>
    <line x1="22" y1="8" x2="22" y2="24" stroke="white" stroke-width="1.5"/>
    <!-- Tige du panier -->
    <line x1="20" y1="8" x2="13" y2="0" stroke="#1E3A6E" stroke-width="2" stroke-linecap="round"/>
    <circle cx="13" cy="0" r="1.5" fill="#1E3A6E"/>
  </g>
</svg>
